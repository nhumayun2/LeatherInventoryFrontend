<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm animate-fade-in p-4 overflow-y-auto"
>
  <div
    class="bg-white/90 backdrop-blur-xl border border-white/60 rounded-3xl p-8 shadow-2xl w-full max-w-lg animate-slide-in-up my-auto"
  >
    <div class="flex justify-between items-center mb-6 border-b border-gray-200/50 pb-4">
      <h2 class="text-2xl font-black text-gray-800 tracking-tight">
        {{ isEditMode ? 'Edit Client' : 'Add New Client' }}
      </h2>
      <button (click)="closeModal()" class="text-gray-400 hover:text-gray-800 transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          ></path>
        </svg>
      </button>
    </div>

    <div class="space-y-6">
      <div>
        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2"
          >Client / Brand Name *</label
        >
        <input
          type="text"
          [(ngModel)]="clientData.name"
          placeholder="e.g. Karigar Leather"
          class="w-full px-4 py-3 bg-white/50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-black text-gray-800 font-bold transition-all shadow-sm"
        />
      </div>

      <div>
        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2"
          >Brand Logo</label
        >

        <input
          type="file"
          #fileInput
          (change)="onFileSelected($event)"
          accept="image/png, image/jpeg, image/webp"
          class="hidden"
        />

        <div
          *ngIf="!imagePreview"
          (click)="fileInput.click()"
          class="w-full h-40 border-2 border-dashed border-gray-300 hover:border-gray-800 rounded-2xl flex flex-col items-center justify-center cursor-pointer bg-white/50 hover:bg-gray-50 transition-all group shadow-sm"
        >
          <div
            class="w-12 h-12 mb-3 rounded-full bg-gray-100 group-hover:bg-white flex items-center justify-center shadow-sm transition-colors"
          >
            <svg
              class="w-6 h-6 text-gray-400 group-hover:text-black transition-colors"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"
              ></path>
            </svg>
          </div>
          <p class="text-sm font-bold text-gray-600 group-hover:text-black transition-colors">
            Click to upload logo
          </p>
          <p class="text-xs text-gray-400 mt-1 font-medium">PNG, JPG up to 5MB</p>
        </div>

        <div
          *ngIf="imagePreview"
          class="relative w-full h-40 border border-gray-200 rounded-2xl overflow-hidden bg-white shadow-sm flex items-center justify-center group"
        >
          <img
            [src]="imagePreview"
            alt="Logo Preview"
            class="max-h-full max-w-full object-contain p-4 transition-transform duration-300 group-hover:scale-95"
          />

          <button
            (click)="removeImage()"
            class="absolute top-3 right-3 p-2 bg-white/90 text-red-500 hover:text-white hover:bg-red-500 rounded-xl shadow border border-gray-100 hover:border-red-500 backdrop-blur-sm transition-all z-10"
            title="Remove Logo"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
              ></path>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div class="flex justify-end gap-3 mt-8 pt-6 border-t border-gray-200/50">
      <button
        (click)="closeModal()"
        class="px-6 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold rounded-xl transition-all"
      >
        Cancel
      </button>
      <button
        (click)="saveClient()"
        class="px-6 py-3 bg-black hover:bg-gray-800 text-white font-bold rounded-xl shadow-lg hover:shadow-xl transition-all active:scale-95"
      >
        {{ isEditMode ? 'Update Client' : 'Save Client' }}
      </button>
    </div>
  </div>
</div>
