<div
  class="fixed inset-0 z-[80] flex items-center justify-center bg-walnut-950/70 backdrop-blur-md animate-fade-in p-4 sm:p-8"
>
  <div
    class="bg-white border border-cinnamon-200 rounded-3xl shadow-2xl w-full h-full max-h-full flex flex-col animate-slide-in-up overflow-hidden relative"
  >
    <div
      class="h-20 border-b border-cinnamon-200 bg-cinnamon-50/80 flex items-center justify-between px-6 shrink-0"
    >
      <div class="flex items-center gap-4">
        <div
          class="w-10 h-10 bg-emerald-100 text-emerald-700 rounded-xl flex items-center justify-center shrink-0 shadow-inner border border-emerald-200"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2.5"
              d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
            ></path>
          </svg>
        </div>
        <div>
          <h2 class="text-xl font-black text-walnut-950 line-clamp-1">{{ document?.fileName }}</h2>
          <p class="text-[11px] font-bold text-saddle-600 uppercase tracking-widest">
            Live Cloud Editor
          </p>
        </div>
      </div>

      <div class="flex items-center gap-3">
        <button
          (click)="downloadCurrentVersion()"
          [disabled]="isLoading || isSaving"
          class="hidden sm:flex items-center gap-2 px-4 py-2.5 bg-white border border-cinnamon-200 hover:bg-cinnamon-50 text-walnut-800 rounded-xl text-sm font-bold transition-all shadow-sm active:scale-95 disabled:opacity-50"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"
            ></path>
          </svg>
          Download
        </button>

        <button
          (click)="saveChanges()"
          [disabled]="isLoading || isSaving"
          class="flex items-center gap-2 px-6 py-2.5 bg-walnut-900 hover:bg-walnut-950 text-white rounded-xl text-sm font-bold shadow-md transition-all active:scale-95 disabled:opacity-50"
        >
          <svg
            *ngIf="!isSaving"
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"
            ></path>
          </svg>
          <div
            *ngIf="isSaving"
            class="w-4 h-4 animate-spin rounded-full border-2 border-white/30 border-t-white"
          ></div>
          {{ isSaving ? 'Saving to Cloud...' : 'Save & Overwrite' }}
        </button>

        <div class="w-px h-8 bg-cinnamon-200 mx-1"></div>

        <button
          (click)="closeModal()"
          [disabled]="isSaving"
          class="p-2 text-walnut-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-colors disabled:opacity-50"
        >
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2.5"
              d="M6 18L18 6M6 6l12 12"
            ></path>
          </svg>
        </button>
      </div>
    </div>

    <div class="h-14 border-b border-cinnamon-200 bg-white flex items-center px-6 gap-3 shrink-0">
      <button
        (click)="addRow()"
        [disabled]="isLoading || isSaving"
        class="px-3 py-1.5 bg-saddle-50 hover:bg-saddle-100 text-saddle-700 text-xs font-bold rounded-lg border border-saddle-200 transition-colors flex items-center gap-1 disabled:opacity-50"
      >
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 4v16m8-8H4"
          ></path>
        </svg>
        Add Row
      </button>
      <button
        (click)="addColumn()"
        [disabled]="isLoading || isSaving"
        class="px-3 py-1.5 bg-saddle-50 hover:bg-saddle-100 text-saddle-700 text-xs font-bold rounded-lg border border-saddle-200 transition-colors flex items-center gap-1 disabled:opacity-50"
      >
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 4v16m8-8H4"
          ></path>
        </svg>
        Add Column
      </button>

      <p
        class="ml-auto text-[10px] font-bold text-walnut-400 uppercase tracking-widest flex items-center gap-1"
      >
        <svg class="w-3 h-3 text-emerald-500" fill="currentColor" viewBox="0 0 20 20">
          <path
            fill-rule="evenodd"
            d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
            clip-rule="evenodd"
          ></path>
        </svg>
        Auto-Synced to JSON
      </p>
    </div>

    <div class="flex-1 overflow-auto bg-cinnamon-50/30 p-6 custom-scrollbar relative">
      <div
        *ngIf="isLoading"
        class="absolute inset-0 flex flex-col items-center justify-center bg-white/80 backdrop-blur-sm z-10"
      >
        <div
          class="animate-spin rounded-full h-12 w-12 border-4 border-cinnamon-200 border-t-saddle-500 mb-4"
        ></div>
        <p class="text-sm font-bold text-walnut-600">Downloading & Parsing Spreadsheet...</p>
      </div>

      <div
        class="inline-block min-w-full bg-white shadow-sm border border-cinnamon-200"
        *ngIf="!isLoading"
      >
        <table class="w-full border-collapse">
          <tbody>
            <tr
              *ngFor="let row of tableData; let i = index"
              class="border-b border-cinnamon-200 hover:bg-saddle-50/30"
            >
              <td
                *ngFor="let cell of row; let j = index"
                contenteditable="true"
                (blur)="updateCell(i, j, $event)"
                class="border-r border-cinnamon-200 p-2.5 text-sm text-walnut-800 font-medium min-w-[120px] max-w-[300px] break-words outline-none focus:bg-saddle-50 focus:ring-2 focus:ring-inset focus:ring-saddle-500 transition-colors cursor-text"
              >
                {{ cell }}
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div
        *ngIf="!isLoading && tableData.length === 0"
        class="h-full flex flex-col items-center justify-center opacity-60"
      >
        <svg
          class="w-16 h-16 text-walnut-300 mb-4"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="1.5"
            d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
          ></path>
        </svg>
        <p class="text-lg font-bold text-walnut-700">Empty Spreadsheet</p>
        <p class="text-sm text-walnut-500 mt-1">Use the toolbar above to add rows and columns.</p>
      </div>
    </div>

    <div
      *ngIf="isSaving"
      class="absolute inset-0 bg-white/50 backdrop-blur-sm z-[90] flex items-center justify-center cursor-wait"
    ></div>
  </div>
</div>
