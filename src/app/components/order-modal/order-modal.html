<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-walnut-950/40 backdrop-blur-sm animate-fade-in p-4 overflow-y-auto"
>
  <div
    class="bg-white/95 backdrop-blur-xl border border-cinnamon-100 rounded-3xl p-8 shadow-2xl w-full max-w-5xl animate-slide-in-up my-auto max-h-[90vh] overflow-y-auto custom-scrollbar"
  >
    <div class="flex justify-between items-center mb-6 border-b border-cinnamon-100 pb-4">
      <h2 class="text-2xl font-black text-walnut-950 tracking-tight">
        {{ isEditMode ? 'Edit Order Details' : 'Create Purchase Order' }}
      </h2>
      <button
        (click)="closeModal()"
        class="text-walnut-400 hover:text-walnut-900 transition-colors"
      >
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          ></path>
        </svg>
      </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
      <div>
        <label class="block text-xs font-bold text-walnut-600 uppercase tracking-wider mb-2"
          >PO Number *</label
        >
        <input
          type="text"
          [(ngModel)]="orderData.poNumber"
          placeholder="e.g. PO-2026-001"
          class="w-full px-4 py-3 bg-cinnamon-50/50 border border-cinnamon-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-saddle-400 text-walnut-900 font-bold transition-all shadow-sm"
        />
      </div>

      <div>
        <label class="block text-xs font-bold text-walnut-600 uppercase tracking-wider mb-2"
          >Company / Client *</label
        >
        <div class="relative">
          <select
            [(ngModel)]="orderData.companyName"
            class="w-full pl-4 pr-10 py-3 bg-cinnamon-50/50 border border-cinnamon-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-saddle-400 text-walnut-900 font-bold appearance-none cursor-pointer transition-all shadow-sm"
          >
            <option value="" disabled selected>Select a Client...</option>
            <option *ngFor="let client of clientsList" [value]="client.name">
              {{ client.name }}
            </option>
          </select>
          <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
            <svg
              class="w-4 h-4 text-walnut-400"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M19 9l-7 7-7-7"
              ></path>
            </svg>
          </div>
        </div>
      </div>

      <div>
        <label class="block text-xs font-bold text-walnut-600 uppercase tracking-wider mb-2"
          >Order Date</label
        >
        <input
          type="date"
          [(ngModel)]="orderData.orderDate"
          class="w-full px-4 py-3 bg-cinnamon-50/50 border border-cinnamon-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-saddle-400 text-walnut-900 font-medium transition-all shadow-sm"
        />
      </div>

      <div>
        <label class="block text-xs font-bold text-walnut-600 uppercase tracking-wider mb-2"
          >Expected Delivery</label
        >
        <input
          type="date"
          [(ngModel)]="orderData.deliveryDate"
          class="w-full px-4 py-3 bg-cinnamon-50/50 border border-cinnamon-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-saddle-400 text-walnut-900 font-medium transition-all shadow-sm"
        />
      </div>

      <div class="md:col-span-2">
        <label class="block text-xs font-bold text-walnut-600 uppercase tracking-wider mb-2"
          >Order Status</label
        >
        <div class="relative">
          <select
            [(ngModel)]="orderData.status"
            class="w-full pl-4 pr-10 py-3 bg-cinnamon-50/50 border border-cinnamon-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-saddle-400 text-walnut-900 font-bold appearance-none cursor-pointer transition-all shadow-sm"
          >
            <option *ngFor="let status of statuses" [value]="status">{{ status }}</option>
          </select>
          <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
            <svg
              class="w-4 h-4 text-walnut-400"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M19 9l-7 7-7-7"
              ></path>
            </svg>
          </div>
        </div>
      </div>
    </div>

    <div class="bg-cinnamon-50/30 rounded-2xl p-6 border border-cinnamon-100 mb-6">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-black text-walnut-950">Order Items</h3>
        <button
          (click)="addItem()"
          class="flex items-center gap-1.5 px-3 py-1.5 bg-saddle-50 hover:bg-saddle-100 text-saddle-600 rounded-lg text-xs font-bold transition-colors border border-saddle-200"
        >
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="3"
              d="M12 4v16m8-8H4"
            ></path>
          </svg>
          Add Product
        </button>
      </div>

      <div class="space-y-3">
        <div
          *ngIf="orderData.items.length === 0"
          class="text-center py-6 text-walnut-500 text-sm font-medium italic"
        >
          No items added yet. Click "Add Product" to start.
        </div>

        <div
          *ngFor="let item of orderData.items; let i = index"
          class="flex flex-col lg:flex-row gap-3 items-start lg:items-center bg-white p-3 rounded-xl border border-cinnamon-200 shadow-sm animate-fade-in"
        >
          <div class="w-full lg:flex-1 relative">
            <select
              [(ngModel)]="item.selectedProductId"
              (ngModelChange)="onProductChange(item)"
              class="w-full pl-3 pr-8 py-2 bg-cinnamon-50/50 border border-cinnamon-200 rounded-lg focus:outline-none focus:bg-white focus:ring-2 focus:ring-saddle-400 text-sm text-walnut-900 font-bold appearance-none cursor-pointer transition-all"
            >
              <option value="" disabled selected>1. Select Category...</option>
              <option *ngFor="let prod of productsList" [value]="prod.id">
                {{ prod.name }}
              </option>
            </select>
            <div class="absolute inset-y-0 right-0 pr-2 flex items-center pointer-events-none">
              <svg
                class="w-4 h-4 text-walnut-400"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M19 9l-7 7-7-7"
                ></path>
              </svg>
            </div>
          </div>

          <div class="w-full lg:flex-1 relative">
            <select
              [(ngModel)]="item.selectedDesignId"
              (ngModelChange)="onDesignChange(item)"
              [disabled]="!item.selectedProductId"
              class="w-full pl-3 pr-8 py-2 bg-cinnamon-50/50 border border-cinnamon-200 rounded-lg focus:outline-none focus:bg-white focus:ring-2 focus:ring-saddle-400 text-sm text-walnut-900 font-bold appearance-none cursor-pointer transition-all disabled:opacity-50 disabled:cursor-not-allowed"
            >
              <option value="" disabled selected>2. Select Design...</option>
              <option *ngFor="let design of item.availableDesigns" [value]="design.id">
                {{ design.designName }}
              </option>
            </select>
            <div class="absolute inset-y-0 right-0 pr-2 flex items-center pointer-events-none">
              <svg
                class="w-4 h-4 text-walnut-400"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M19 9l-7 7-7-7"
                ></path>
              </svg>
            </div>
          </div>

          <div class="w-full lg:w-32">
            <input
              type="text"
              [(ngModel)]="item.articleNumber"
              readonly
              placeholder="Article #"
              class="w-full px-3 py-2 bg-cinnamon-100 border border-cinnamon-200 rounded-lg text-sm text-walnut-600 font-bold cursor-not-allowed transition-all"
              title="Auto-filled from catalog"
            />
          </div>

          <div class="w-full lg:w-20">
            <input
              type="number"
              [(ngModel)]="item.quantity"
              min="1"
              placeholder="Qty"
              class="w-full px-3 py-2 bg-cinnamon-50/50 border border-cinnamon-200 rounded-lg focus:outline-none focus:bg-white focus:ring-2 focus:ring-saddle-400 text-sm text-center text-walnut-900 font-black transition-all"
            />
          </div>

          <button
            (click)="removeItem(i)"
            class="p-2 text-walnut-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors self-end lg:self-auto shrink-0"
            title="Remove Item"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
              ></path>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div class="flex justify-end gap-3 pt-4 border-t border-cinnamon-100">
      <button
        (click)="closeModal()"
        class="px-6 py-3 bg-cinnamon-100 hover:bg-cinnamon-200 text-walnut-800 font-bold rounded-xl transition-all"
      >
        Cancel
      </button>
      <button
        (click)="saveOrder()"
        class="px-6 py-3 bg-walnut-900 hover:bg-walnut-950 text-white font-bold rounded-xl shadow-lg hover:shadow-xl transition-all active:scale-95"
      >
        {{ isEditMode ? 'Update Order' : 'Save Order' }}
      </button>
    </div>
  </div>
</div>
