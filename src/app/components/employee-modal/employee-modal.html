<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-walnut-950/40 backdrop-blur-sm animate-fade-in p-4 overflow-y-auto"
>
  <div
    class="bg-white/95 backdrop-blur-xl border border-cinnamon-100 rounded-3xl p-8 shadow-2xl w-full max-w-2xl animate-slide-in-up my-auto"
  >
    <div class="flex justify-between items-center mb-6 border-b border-cinnamon-100 pb-4">
      <h2 class="text-2xl font-black text-walnut-950 tracking-tight">
        {{ isEditMode ? 'Edit Employee' : 'Add New Employee' }}
      </h2>
      <button
        (click)="closeModal()"
        [disabled]="isSaving"
        class="text-walnut-400 hover:text-walnut-900 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          ></path>
        </svg>
      </button>
    </div>

    <div class="space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div>
          <label class="block text-xs font-bold text-walnut-600 uppercase tracking-wider mb-2"
            >Full Name *</label
          >
          <input
            type="text"
            [(ngModel)]="employeeData.name"
            [disabled]="isSaving"
            placeholder="e.g. Jane Doe"
            class="w-full px-4 py-3 bg-cinnamon-50/50 border border-cinnamon-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-saddle-400 text-walnut-900 font-bold transition-all shadow-sm disabled:opacity-60 disabled:cursor-not-allowed"
          />
        </div>
        <div>
          <label class="block text-xs font-bold text-walnut-600 uppercase tracking-wider mb-2"
            >Role *</label
          >
          <input
            type="text"
            [(ngModel)]="employeeData.role"
            [disabled]="isSaving"
            placeholder="e.g. Master Craftsman"
            class="w-full px-4 py-3 bg-cinnamon-50/50 border border-cinnamon-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-saddle-400 text-walnut-900 font-medium transition-all shadow-sm disabled:opacity-60 disabled:cursor-not-allowed"
          />
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div>
          <label class="block text-xs font-bold text-walnut-600 uppercase tracking-wider mb-2"
            >Email Address</label
          >
          <input
            type="email"
            [(ngModel)]="employeeData.email"
            [disabled]="isSaving"
            placeholder="e.g. jane@example.com"
            class="w-full px-4 py-3 bg-cinnamon-50/50 border border-cinnamon-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-saddle-400 text-walnut-900 font-medium transition-all shadow-sm disabled:opacity-60 disabled:cursor-not-allowed"
          />
        </div>
        <div>
          <label class="block text-xs font-bold text-walnut-600 uppercase tracking-wider mb-2"
            >Phone Number</label
          >
          <input
            type="tel"
            [(ngModel)]="employeeData.phone"
            [disabled]="isSaving"
            placeholder="e.g. +1 234 567 8900"
            class="w-full px-4 py-3 bg-cinnamon-50/50 border border-cinnamon-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-saddle-400 text-walnut-900 font-medium transition-all shadow-sm disabled:opacity-60 disabled:cursor-not-allowed"
          />
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div>
          <label class="block text-xs font-bold text-walnut-600 uppercase tracking-wider mb-2"
            >Monthly Salary ($)</label
          >
          <input
            type="number"
            [(ngModel)]="employeeData.monthlySalary"
            [disabled]="isSaving"
            placeholder="0"
            class="w-full px-4 py-3 bg-cinnamon-50/50 border border-cinnamon-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-saddle-400 text-walnut-900 font-black transition-all shadow-sm disabled:opacity-60 disabled:cursor-not-allowed"
          />
        </div>
        <div>
          <label class="block text-xs font-bold text-walnut-600 uppercase tracking-wider mb-2"
            >Joined Date</label
          >
          <input
            type="date"
            [(ngModel)]="employeeData.joinedDate"
            [disabled]="isSaving"
            class="w-full px-4 py-3 bg-cinnamon-50/50 border border-cinnamon-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-saddle-400 text-walnut-900 font-medium transition-all shadow-sm disabled:opacity-60 disabled:cursor-not-allowed"
            [ngClass]="!isSaving ? 'cursor-pointer' : ''"
          />
        </div>
      </div>

      <div>
        <label class="block text-xs font-bold text-walnut-600 uppercase tracking-wider mb-2"
          >Skills</label
        >
        <div
          class="p-2 bg-cinnamon-50/50 border border-cinnamon-200 rounded-xl transition-all flex flex-wrap gap-2 items-center min-h-[54px] shadow-sm"
          [ngClass]="
            isSaving
              ? 'opacity-70 bg-cinnamon-100/50'
              : 'focus-within:ring-2 focus-within:ring-saddle-400'
          "
        >
          <span
            *ngFor="let skill of employeeData.skills; let i = index"
            class="bg-saddle-50 text-saddle-700 px-3 py-1.5 rounded-full text-xs font-bold flex items-center gap-2 shadow-sm animate-fade-in border border-saddle-200"
          >
            {{ skill }}
            <button
              *ngIf="!isSaving"
              (click)="removeSkill(i)"
              class="hover:text-saddle-900 transition-colors"
            >
              <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="3"
                  d="M6 18L18 6M6 6l12 12"
                ></path>
              </svg>
            </button>
          </span>

          <input
            type="text"
            [(ngModel)]="currentSkill"
            [disabled]="isSaving"
            (keydown.enter)="addSkill($event)"
            placeholder="Type a skill & press Enter..."
            class="flex-1 bg-transparent border-none focus:outline-none text-walnut-900 font-medium min-w-[180px] text-sm px-2 placeholder-walnut-400 disabled:cursor-not-allowed"
          />
        </div>
      </div>
    </div>

    <div class="flex justify-end gap-3 mt-8 pt-6 border-t border-cinnamon-100">
      <button
        (click)="closeModal()"
        [disabled]="isSaving"
        class="px-6 py-3 bg-cinnamon-100 hover:bg-cinnamon-200 text-walnut-800 font-bold rounded-xl transition-all disabled:opacity-50 disabled:cursor-not-allowed"
      >
        Cancel
      </button>
      <button
        (click)="saveEmployee()"
        [disabled]="isSaving"
        class="flex items-center justify-center gap-2 px-6 py-3 bg-walnut-900 text-white font-bold rounded-xl shadow-lg transition-all min-w-[180px]"
        [ngClass]="
          isSaving
            ? 'opacity-80 cursor-not-allowed'
            : 'hover:bg-walnut-950 hover:shadow-xl active:scale-95'
        "
      >
        <svg
          *ngIf="isSaving"
          class="w-5 h-5 animate-spin text-white"
          fill="none"
          viewBox="0 0 24 24"
        >
          <circle
            class="opacity-25"
            cx="12"
            cy="12"
            r="10"
            stroke="currentColor"
            stroke-width="4"
          ></circle>
          <path
            class="opacity-75"
            fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
          ></path>
        </svg>
        <span>{{ isSaving ? 'Saving...' : isEditMode ? 'Update Employee' : 'Save Employee' }}</span>
      </button>
    </div>
  </div>
</div>
