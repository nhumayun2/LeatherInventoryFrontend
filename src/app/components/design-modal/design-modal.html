<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-walnut-950/50 backdrop-blur-sm animate-fade-in p-4 overflow-y-auto"
>
  <div
    class="bg-white border border-cinnamon-100 rounded-2xl shadow-2xl w-full max-w-4xl animate-slide-in-up my-auto max-h-[90vh] overflow-hidden flex flex-col"
  >
    <!-- Header -->
    <div class="flex justify-between items-center px-6 py-4 border-b border-cinnamon-100 bg-gradient-to-r from-cinnamon-50 to-white">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-walnut-900 flex items-center justify-center shadow-md">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
          </svg>
        </div>
        <div>
          <h2 class="text-lg font-black text-walnut-950 tracking-tight">
            {{ isEditMode ? 'Edit Design' : 'New Design' }}
          </h2>
          <p class="text-xs text-walnut-500 font-medium">Fill in the product details</p>
        </div>
      </div>
      <button
        (click)="closeModal()"
        [disabled]="isSaving"
        class="w-8 h-8 flex items-center justify-center rounded-lg text-walnut-400 hover:text-walnut-900 hover:bg-cinnamon-100 transition-all disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>

    <!-- Scrollable Content -->
    <div class="flex-1 overflow-y-auto custom-scrollbar px-6 py-5">
      <!-- Primary Info Section -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-5">
        <div class="md:col-span-2">
          <label class="block text-[11px] font-bold text-walnut-500 uppercase tracking-wider mb-1.5">Design Name *</label>
          <input
            type="text"
            [(ngModel)]="designData.designName"
            [disabled]="isSaving"
            placeholder="e.g. Classic Bi-Fold Wallet"
            class="w-full px-3.5 py-2.5 bg-cinnamon-50/50 border border-cinnamon-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-saddle-400 focus:border-transparent text-walnut-900 font-semibold text-sm transition-all disabled:opacity-60 disabled:cursor-not-allowed placeholder:text-walnut-300"
          />
        </div>

        <div>
          <label class="block text-[11px] font-bold text-walnut-500 uppercase tracking-wider mb-1.5">Client Article #&apos;s</label>
          <div class="flex gap-2">
            <input
              type="text"
              [(ngModel)]="newClientArticle"
              [disabled]="isSaving"
              (keyup.enter)="!isSaving && addClientArticle()"
              placeholder="e.g. Bata-B123"
              class="flex-1 px-3.5 py-2.5 bg-cinnamon-50/50 border border-cinnamon-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-saddle-400 text-sm font-medium transition-all disabled:opacity-60 disabled:cursor-not-allowed placeholder:text-walnut-300"
            />
            <button
              (click)="addClientArticle()"
              [disabled]="isSaving"
              class="px-3 py-2.5 bg-walnut-800 text-white rounded-lg transition-all font-bold text-xs disabled:opacity-50 disabled:cursor-not-allowed hover:bg-walnut-900 active:scale-95"
            >
              Add
            </button>
          </div>
          <div *ngIf="designData.clientArticleNumbers.length > 0" class="flex flex-wrap gap-1.5 mt-2">
            <div
              *ngFor="let article of designData.clientArticleNumbers; let i = index"
              class="inline-flex items-center gap-1.5 bg-saddle-50 text-saddle-700 px-2.5 py-1 rounded-md text-xs font-bold border border-saddle-100"
            >
              <span [ngClass]="isSaving ? 'opacity-60' : ''">{{ article }}</span>
              <button *ngIf="!isSaving" (click)="removeClientArticle(i)" class="text-saddle-400 hover:text-red-500">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
              </button>
            </div>
          </div>
        </div>

        <div>
          <label class="block text-[11px] font-bold text-walnut-500 uppercase tracking-wider mb-1.5">Karigar Article #</label>
          <input
            type="text"
            [(ngModel)]="designData.karigarArticleNumber"
            [disabled]="isSaving"
            placeholder="e.g. W-104"
            class="w-full px-3.5 py-2.5 bg-cinnamon-50/50 border border-cinnamon-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-saddle-400 text-walnut-900 font-semibold text-sm transition-all disabled:opacity-60 disabled:cursor-not-allowed placeholder:text-walnut-300"
          />
        </div>
      </div>

      <!-- Secondary Info Row -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-5">
        <div>
          <label class="block text-[11px] font-bold text-walnut-500 uppercase tracking-wider mb-1.5">Unit Price</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <span class="text-walnut-400 font-bold text-sm">$</span>
            </div>
            <input
              type="number"
              [(ngModel)]="designData.price"
              [disabled]="isSaving"
              placeholder="0.00"
              min="0"
              step="0.01"
              class="w-full pl-7 pr-3 py-2.5 bg-cinnamon-50/50 border border-cinnamon-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-saddle-400 text-walnut-900 font-semibold text-sm transition-all disabled:opacity-60 disabled:cursor-not-allowed placeholder:text-walnut-300"
            />
          </div>
        </div>

        <div>
          <label class="block text-[11px] font-bold text-walnut-500 uppercase tracking-wider mb-1.5">Stock</label>
          <input
            type="number"
            [(ngModel)]="designData.stock"
            [disabled]="isSaving"
            min="0"
            placeholder="0"
            class="w-full px-3.5 py-2.5 bg-cinnamon-50/50 border border-cinnamon-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-saddle-400 text-walnut-900 font-semibold text-sm transition-all disabled:opacity-60 disabled:cursor-not-allowed placeholder:text-walnut-300"
          />
        </div>

        <div>
          <label class="block text-[11px] font-bold text-walnut-500 uppercase tracking-wider mb-1.5">Status</label>
          <div class="relative">
            <select
              [(ngModel)]="designData.status"
              [disabled]="isSaving"
              class="w-full px-3.5 py-2.5 bg-cinnamon-50/50 border border-cinnamon-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-saddle-400 text-walnut-900 font-semibold text-sm appearance-none transition-all disabled:opacity-60 disabled:cursor-not-allowed pr-8"
              [ngClass]="!isSaving ? 'cursor-pointer' : ''"
            >
              <option *ngFor="let status of statuses" [value]="status">{{ status }}</option>
            </select>
            <div class="absolute inset-y-0 right-0 pr-2.5 flex items-center pointer-events-none">
              <svg class="w-4 h-4 text-walnut-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
              </svg>
            </div>
          </div>
        </div>

        <div>
          <label class="block text-[11px] font-bold text-walnut-500 uppercase tracking-wider mb-1.5">Exclusive Client</label>
          <div class="relative">
            <select
              [(ngModel)]="designData.clientId"
              [disabled]="isSaving"
              class="w-full px-3.5 py-2.5 bg-cinnamon-50/50 border border-cinnamon-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-saddle-400 text-walnut-900 font-semibold text-sm appearance-none transition-all disabled:opacity-60 disabled:cursor-not-allowed pr-8"
              [ngClass]="!isSaving ? 'cursor-pointer' : ''"
            >
              <option [ngValue]="null">General Catalog</option>
              <option *ngFor="let client of clientsList" [ngValue]="client.id">{{ client.name }}</option>
            </select>
            <div class="absolute inset-y-0 right-0 pr-2.5 flex items-center pointer-events-none">
              <svg class="w-4 h-4 text-walnut-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
              </svg>
            </div>
          </div>
        </div>
      </div>

      <!-- Specifications -->
      <div class="mb-5">
        <label class="block text-[11px] font-bold text-walnut-500 uppercase tracking-wider mb-1.5">Specifications</label>
        <textarea
          [(ngModel)]="designData.specifications"
          [disabled]="isSaving"
          rows="2"
          placeholder="e.g. 100% Genuine Cow Leather, Nylon Thread..."
          class="w-full px-3.5 py-2.5 bg-cinnamon-50/50 border border-cinnamon-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-saddle-400 text-walnut-900 font-medium text-sm transition-all resize-none disabled:opacity-60 disabled:cursor-not-allowed placeholder:text-walnut-300"
        ></textarea>
      </div>

      <!-- Features and Tags Row -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-5">
        <div>
          <label class="block text-[11px] font-bold text-walnut-500 uppercase tracking-wider mb-1.5">Key Features</label>
          <div class="flex gap-2">
            <input
              type="text"
              [(ngModel)]="newFeature"
              [disabled]="isSaving"
              (keyup.enter)="!isSaving && addFeature()"
              placeholder="e.g. RFID Blocking"
              class="flex-1 px-3.5 py-2.5 bg-cinnamon-50/50 border border-cinnamon-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-saddle-400 text-sm font-medium transition-all disabled:opacity-60 disabled:cursor-not-allowed placeholder:text-walnut-300"
            />
            <button
              (click)="addFeature()"
              [disabled]="isSaving"
              class="px-3 py-2.5 bg-walnut-800 text-white rounded-lg transition-all font-bold text-xs disabled:opacity-50 disabled:cursor-not-allowed hover:bg-walnut-900 active:scale-95"
            >
              Add
            </button>
          </div>
          <div *ngIf="designData.features.length > 0" class="flex flex-wrap gap-1.5 mt-2">
            <div
              *ngFor="let feat of designData.features; let i = index"
              class="inline-flex items-center gap-1.5 bg-cinnamon-50 text-walnut-700 px-2.5 py-1 rounded-md text-xs font-semibold border border-cinnamon-100"
            >
              <span [ngClass]="isSaving ? 'opacity-60' : ''">{{ feat }}</span>
              <button *ngIf="!isSaving" (click)="removeFeature(i)" class="text-walnut-400 hover:text-red-500">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
              </button>
            </div>
          </div>
        </div>

        <div>
          <label class="block text-[11px] font-bold text-walnut-500 uppercase tracking-wider mb-1.5">Search Tags</label>
          <div class="flex gap-2">
            <input
              type="text"
              [(ngModel)]="newTag"
              [disabled]="isSaving"
              (keyup.enter)="!isSaving && addTag()"
              placeholder="e.g. summer-collection"
              class="flex-1 px-3.5 py-2.5 bg-cinnamon-50/50 border border-cinnamon-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-saddle-400 text-sm font-medium transition-all disabled:opacity-60 disabled:cursor-not-allowed placeholder:text-walnut-300"
            />
            <button
              (click)="addTag()"
              [disabled]="isSaving"
              class="px-3 py-2.5 bg-walnut-800 text-white rounded-lg transition-all font-bold text-xs disabled:opacity-50 disabled:cursor-not-allowed hover:bg-walnut-900 active:scale-95"
            >
              Add
            </button>
          </div>
          <div *ngIf="designData.tags.length > 0" class="flex flex-wrap gap-1.5 mt-2">
            <div
              *ngFor="let tag of designData.tags; let i = index"
              class="inline-flex items-center gap-1.5 bg-white text-walnut-600 px-2.5 py-1 rounded-full text-xs font-bold border border-cinnamon-200"
              [ngClass]="isSaving ? 'opacity-60' : 'hover:bg-cinnamon-50'"
            >
              <span>#{{ tag }}</span>
              <button *ngIf="!isSaving" (click)="removeTag(i)" class="text-walnut-400 hover:text-red-500">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Product Images Section (Moved up, reduced size) -->
      <div class="mb-5">
        <label class="block text-[11px] font-bold text-walnut-500 uppercase tracking-wider mb-2">Product Images</label>
        <input
          type="file"
          #imageInput
          (change)="onImagesSelected($event)"
          accept="image/png, image/jpeg, image/webp"
          multiple
          [disabled]="isSaving"
          class="hidden"
        />

        <div class="grid grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-2">
          <div
            (click)="!isSaving && imageInput.click()"
            class="aspect-square border-2 border-dashed border-cinnamon-300 rounded-lg flex flex-col items-center justify-center bg-cinnamon-50/50 transition-all"
            [ngClass]="isSaving ? 'opacity-60 cursor-not-allowed' : 'hover:border-saddle-500 hover:bg-cinnamon-100 cursor-pointer group'"
          >
            <div class="w-7 h-7 mb-1 rounded-full bg-white flex items-center justify-center shadow-sm border border-cinnamon-100 transition-colors" [ngClass]="!isSaving ? 'group-hover:bg-cinnamon-50' : ''">
              <svg class="w-3.5 h-3.5 text-walnut-400 transition-colors" [ngClass]="!isSaving ? 'group-hover:text-saddle-500' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
              </svg>
            </div>
            <p class="text-[9px] font-bold text-walnut-500 transition-colors" [ngClass]="!isSaving ? 'group-hover:text-saddle-600' : ''">Add</p>
          </div>

          <div
            *ngFor="let file of selectedImages; let i = index"
            class="relative aspect-square border border-blue-200 rounded-lg overflow-hidden bg-blue-50 shadow-sm flex items-center justify-center group p-1.5"
            [ngClass]="isSaving ? 'opacity-70' : ''"
          >
            <p class="text-[8px] text-blue-800 font-bold text-center break-words line-clamp-2">{{ file.name }}</p>
            <div *ngIf="!isSaving" class="absolute inset-0 bg-blue-500/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
            <button
              *ngIf="!isSaving"
              (click)="removeSelectedImage(i)"
              class="absolute top-1 right-1 p-1 bg-white/90 text-red-500 hover:text-white hover:bg-red-500 rounded-md shadow-sm border border-gray-100 transition-all z-10"
              title="Remove"
            >
              <svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
              </svg>
            </button>
          </div>

          <div
            *ngFor="let url of existingImageUrls"
            class="relative aspect-square border border-cinnamon-200 rounded-lg overflow-hidden bg-white shadow-sm flex items-center justify-center group"
            [ngClass]="isSaving ? 'opacity-70' : ''"
          >
            <img [src]="url" alt="Existing Image" class="max-h-full max-w-full object-cover w-full h-full transition-transform duration-300" [ngClass]="!isSaving ? 'group-hover:scale-105' : ''" />
            <div *ngIf="!isSaving" class="absolute inset-0 bg-gradient-to-t from-walnut-950/70 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end p-1.5">
              <p class="text-white text-[8px] font-bold tracking-wider uppercase drop-shadow-md">Saved</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Costing Sheet Section (At bottom, compact) -->
      <div class="bg-cinnamon-50/50 border border-cinnamon-100 rounded-xl p-4">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-3">
          <div>
            <label class="block text-[11px] font-bold text-walnut-500 uppercase tracking-wider">Costing Sheet</label>
            <p class="text-[10px] text-walnut-400 font-medium mt-0.5">Upload Excel or paste OneDrive link</p>
          </div>
          
          <div class="flex bg-white p-0.5 rounded-lg border border-cinnamon-200 shadow-sm">
            <button
              (click)="setCostingType('file')"
              [disabled]="isSaving"
              [class.bg-walnut-800]="costingInputType === 'file'"
              [class.text-white]="costingInputType === 'file'"
              [class.text-walnut-500]="costingInputType !== 'file'"
              class="px-3 py-1.5 text-[10px] font-bold rounded-md transition-all flex items-center gap-1.5"
            >
              <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
              </svg>
              File
            </button>
            <button
              (click)="setCostingType('link')"
              [disabled]="isSaving"
              [class.bg-walnut-800]="costingInputType === 'link'"
              [class.text-white]="costingInputType === 'link'"
              [class.text-walnut-500]="costingInputType !== 'link'"
              class="px-3 py-1.5 text-[10px] font-bold rounded-md transition-all flex items-center gap-1.5"
            >
              <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path>
              </svg>
              Link
            </button>
          </div>
        </div>

        <!-- File Upload Option -->
        <div *ngIf="costingInputType === 'file'" class="animate-fade-in">
          <input type="file" #costingFileInput (change)="onCostingFileSelected($event)" accept=".xlsx, .xls" [disabled]="isSaving" class="hidden" />

          <div
            *ngIf="!costingFileName"
            (click)="!isSaving && costingFileInput.click()"
            class="w-full border border-dashed border-cinnamon-300 rounded-lg p-4 flex items-center justify-center gap-3 bg-white transition-all"
            [ngClass]="isSaving ? 'opacity-60 cursor-not-allowed' : 'hover:border-saddle-500 hover:bg-cinnamon-50 cursor-pointer group'"
          >
            <div class="w-8 h-8 rounded-lg bg-cinnamon-100 flex items-center justify-center transition-colors text-saddle-500" [ngClass]="!isSaving ? 'group-hover:bg-saddle-100' : ''">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
              </svg>
            </div>
            <div>
              <p class="text-xs font-bold text-walnut-700">Click to upload</p>
              <p class="text-[10px] text-walnut-400 font-medium">.xlsx or .xls</p>
            </div>
          </div>

          <div
            *ngIf="costingFileName"
            class="w-full flex items-center justify-between bg-white border border-cinnamon-200 rounded-lg p-3"
            [ngClass]="isSaving ? 'opacity-70' : ''"
          >
            <div class="flex items-center gap-2.5">
              <div class="p-1.5 bg-saddle-50 text-saddle-600 rounded-lg border border-saddle-100">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
              </div>
              <div>
                <p class="text-xs font-bold text-walnut-900 line-clamp-1">{{ costingFileName }}</p>
                <p class="text-[10px] text-walnut-500 font-medium">Excel Document</p>
              </div>
            </div>

            <button
              *ngIf="!isSaving"
              (click)="removeCostingFile()"
              class="p-1.5 text-red-500 hover:text-white hover:bg-red-500 rounded-lg transition-all"
              title="Remove File"
            >
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
              </svg>
            </button>
          </div>
        </div>

        <!-- Cloud Link Option -->
        <div *ngIf="costingInputType === 'link'" class="animate-fade-in relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="w-4 h-4 text-saddle-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path>
            </svg>
          </div>
          <input
            type="text"
            [(ngModel)]="costingLink"
            [disabled]="isSaving"
            placeholder="Paste Microsoft OneDrive sharing link..."
            class="w-full pl-9 pr-3 py-2.5 bg-white border border-cinnamon-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-saddle-400 text-walnut-900 font-medium text-sm transition-all disabled:opacity-60 disabled:cursor-not-allowed placeholder:text-walnut-300"
          />
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="flex justify-end gap-2.5 px-6 py-4 border-t border-cinnamon-100 bg-gradient-to-r from-white to-cinnamon-50">
      <button
        (click)="closeModal()"
        [disabled]="isSaving"
        class="px-5 py-2.5 bg-cinnamon-100 hover:bg-cinnamon-200 text-walnut-700 font-bold text-sm rounded-lg transition-all disabled:opacity-50 disabled:cursor-not-allowed"
      >
        Cancel
      </button>
      <button
        (click)="saveDesign()"
        [disabled]="isSaving"
        class="flex items-center justify-center gap-2 px-5 py-2.5 bg-walnut-900 text-white font-bold text-sm rounded-lg shadow-lg transition-all min-w-[130px]"
        [ngClass]="isSaving ? 'opacity-80 cursor-not-allowed' : 'hover:bg-walnut-950 hover:shadow-xl active:scale-95'"
      >
        <svg *ngIf="isSaving" class="w-4 h-4 animate-spin text-white" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span>{{ isSaving ? 'Saving...' : isEditMode ? 'Update' : 'Save Design' }}</span>
      </button>
    </div>
  </div>
</div>
