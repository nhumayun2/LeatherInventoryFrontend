<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm animate-fade-in p-4 overflow-y-auto"
>
  <div
    class="bg-white/90 backdrop-blur-xl border border-white/60 rounded-3xl p-8 shadow-2xl w-full max-w-2xl animate-slide-in-up my-auto"
  >
    <div class="flex justify-between items-center mb-6 border-b border-gray-200/50 pb-4">
      <h2 class="text-2xl font-black text-gray-800 tracking-tight">Add New Design</h2>
      <button (click)="closeModal()" class="text-gray-400 hover:text-gray-800 transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          ></path>
        </svg>
      </button>
    </div>

    <div class="space-y-5">
      <div>
        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2"
          >Design Name *</label
        >
        <input
          type="text"
          [(ngModel)]="designData.designName"
          placeholder="e.g. Slim Bifold - Brown"
          class="w-full px-4 py-3 bg-white/50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-black text-gray-800 font-bold transition-all"
        />
      </div>

      <div>
        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2"
          >Product Images</label
        >
        <input
          type="file"
          (change)="onFileSelected($event)"
          accept="image/*"
          multiple
          class="w-full px-4 py-2 bg-white/50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-black text-sm text-gray-600 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition-all cursor-pointer"
        />

        <div *ngIf="previewUrls.length > 0" class="flex flex-wrap gap-3 mt-4 animate-fade-in-up">
          <div
            *ngFor="let url of previewUrls; let i = index"
            class="relative w-20 h-20 rounded-xl overflow-hidden border border-gray-200 shadow-sm group"
          >
            <img [src]="url" class="w-full h-full object-cover" />
            <button
              (click)="removeImage(i)"
              class="absolute inset-0 bg-black/50 text-white flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity backdrop-blur-sm"
            >
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M6 18L18 6M6 6l12 12"
                ></path>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div>
          <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2"
            >SKU Code</label
          >
          <input
            type="text"
            [(ngModel)]="designData.sku"
            placeholder="e.g. WLT-BRN-002"
            class="w-full px-4 py-3 bg-white/50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-black text-gray-800 font-medium uppercase transition-all"
          />
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2"
            >Price ($)</label
          >
          <input
            type="number"
            [(ngModel)]="designData.price"
            placeholder="0.00"
            class="w-full px-4 py-3 bg-white/50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-black text-gray-800 font-black transition-all"
          />
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div>
          <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2"
            >Client / Brand</label
          >
          <select
            [(ngModel)]="designData.clientId"
            class="w-full px-4 py-3 bg-white/50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-black text-gray-800 font-medium transition-all cursor-pointer"
          >
            <option [ngValue]="null">No Brand (In-House)</option>
            <option *ngFor="let client of clients" [ngValue]="client.id">{{ client.name }}</option>
          </select>
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2"
            >Design Status</label
          >
          <select
            [(ngModel)]="designData.status"
            class="w-full px-4 py-3 bg-white/50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-black text-gray-800 font-medium transition-all cursor-pointer"
          >
            <option value="Draft">Draft</option>
            <option value="In Production">In Production</option>
            <option value="Active">Active</option>
            <option value="Archived">Archived</option>
          </select>
        </div>
      </div>

      <div>
        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2"
          >Specifications</label
        >
        <input
          type="text"
          [(ngModel)]="designData.specifications"
          placeholder="e.g. Genuine Leather, RFID Protected"
          class="w-full px-4 py-3 bg-white/50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-black text-gray-800 font-medium transition-all"
        />
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div>
          <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2"
            >Features</label
          >
          <div
            class="p-2 bg-white/50 border border-gray-200 rounded-xl focus-within:ring-2 focus-within:ring-black transition-all flex flex-wrap gap-2 items-center min-h-[50px]"
          >
            <span
              *ngFor="let feature of features; let i = index"
              class="bg-purple-100 text-purple-700 px-3 py-1 rounded-full text-xs font-bold flex items-center gap-2 shadow-sm animate-fade-in"
            >
              {{ feature }}
              <button (click)="removeFeature(i)" class="hover:text-purple-900 transition-colors">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="3"
                    d="M6 18L18 6M6 6l12 12"
                  ></path>
                </svg>
              </button>
            </span>

            <input
              type="text"
              [(ngModel)]="currentFeature"
              (keydown.enter)="addFeature($event)"
              placeholder="Type & press Enter..."
              class="flex-1 bg-transparent border-none focus:outline-none text-gray-800 font-medium min-w-[120px] text-sm"
            />
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2"
            >Tags</label
          >
          <div
            class="p-2 bg-white/50 border border-gray-200 rounded-xl focus-within:ring-2 focus-within:ring-black transition-all flex flex-wrap gap-2 items-center min-h-[50px]"
          >
            <span
              *ngFor="let tag of tags; let i = index"
              class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold flex items-center gap-2 shadow-sm animate-fade-in"
            >
              {{ tag }}
              <button (click)="removeTag(i)" class="hover:text-blue-900 transition-colors">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="3"
                    d="M6 18L18 6M6 6l12 12"
                  ></path>
                </svg>
              </button>
            </span>

            <input
              type="text"
              [(ngModel)]="currentTag"
              (keydown.enter)="addTag($event)"
              placeholder="Type & press Enter..."
              class="flex-1 bg-transparent border-none focus:outline-none text-gray-800 font-medium min-w-[120px] text-sm"
            />
          </div>
        </div>
      </div>

      <div class="p-4 bg-gray-50 rounded-2xl border border-gray-100">
        <label class="block text-xs font-black text-gray-800 uppercase tracking-wider mb-3"
          >Initial Factory Inventory</label
        >
        <div class="grid grid-cols-3 gap-3">
          <div>
            <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Ready</label>
            <input
              type="number"
              [(ngModel)]="designData.quantityReady"
              class="w-full px-3 py-2 bg-white border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 text-green-600 font-black text-center"
            />
          </div>
          <div>
            <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">In Prod.</label>
            <input
              type="number"
              [(ngModel)]="designData.quantityInProduction"
              class="w-full px-3 py-2 bg-white border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-500 text-yellow-600 font-black text-center"
            />
          </div>
          <div>
            <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Damaged</label>
            <input
              type="number"
              [(ngModel)]="designData.quantityDamaged"
              class="w-full px-3 py-2 bg-white border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 text-red-600 font-black text-center"
            />
          </div>
        </div>
      </div>
    </div>

    <div class="flex justify-end gap-3 mt-8 pt-6 border-t border-gray-200/50">
      <button
        (click)="closeModal()"
        class="px-6 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold rounded-xl transition-all"
      >
        Cancel
      </button>
      <button
        (click)="saveDesign()"
        class="px-6 py-3 bg-black hover:bg-gray-800 text-white font-bold rounded-xl shadow-lg hover:shadow-xl transition-all active:scale-95"
      >
        Save Design
      </button>
    </div>
  </div>
</div>
