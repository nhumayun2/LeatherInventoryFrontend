<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-walnut-950/40 backdrop-blur-sm animate-fade-in p-4"
>
  <div
    class="bg-white/95 backdrop-blur-xl border border-cinnamon-100 rounded-3xl p-8 shadow-2xl w-full max-w-md animate-slide-in-up"
  >
    <div class="flex justify-between items-center mb-6 border-b border-cinnamon-100 pb-4">
      <h2 class="text-2xl font-black text-walnut-950 tracking-tight">
        {{ isEditMode ? 'Edit Category' : 'Add New Category' }}
      </h2>
      <button
        (click)="closeModal()"
        class="text-walnut-400 hover:text-walnut-900 transition-colors"
      >
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          ></path>
        </svg>
      </button>
    </div>

    <div class="space-y-5">
      <div>
        <label class="block text-xs font-bold text-walnut-600 uppercase tracking-wider mb-2"
          >Category Name *</label
        >

        <input
          type="text"
          [(ngModel)]="categoryData.Name"
          placeholder="e.g. Leather Satchel"
          class="w-full px-4 py-3 bg-cinnamon-50/50 border border-cinnamon-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-saddle-400 focus:border-transparent text-walnut-900 font-bold transition-all shadow-sm"
        />
      </div>

      <div>
        <label class="block text-xs font-bold text-walnut-600 uppercase tracking-wider mb-2"
          >Description</label
        >
        <textarea
          [(ngModel)]="categoryData.Description"
          placeholder="Brief description of this category..."
          rows="3"
          class="w-full px-4 py-3 bg-cinnamon-50/50 border border-cinnamon-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-saddle-400 focus:border-transparent text-walnut-900 font-medium transition-all shadow-sm resize-none"
        ></textarea>
      </div>
    </div>

    <div class="flex justify-end gap-3 mt-8 pt-6 border-t border-cinnamon-100">
      <button
        (click)="closeModal()"
        class="px-6 py-3 bg-cinnamon-100 hover:bg-cinnamon-200 text-walnut-800 font-bold rounded-xl transition-all"
      >
        Cancel
      </button>
      <button
        (click)="saveCategory()"
        class="px-6 py-3 bg-walnut-900 hover:bg-walnut-950 text-white font-bold rounded-xl shadow-lg hover:shadow-xl transition-all active:scale-95"
      >
        {{ isEditMode ? 'Update Category' : 'Save Category' }}
      </button>
    </div>
  </div>
</div>
