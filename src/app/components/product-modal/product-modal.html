<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm animate-fade-in"
>
  <div
    class="bg-white/90 backdrop-blur-xl border border-white/60 rounded-3xl p-8 shadow-2xl w-full max-w-md animate-slide-in-up"
  >
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-2xl font-black text-gray-800 tracking-tight">
        {{ isEditMode ? 'Edit Category' : 'Add New Category' }}
      </h2>
      <button (click)="closeModal()" class="text-gray-400 hover:text-gray-800 transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          ></path>
        </svg>
      </button>
    </div>

    <div class="space-y-5">
      <div>
        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2"
          >Category Name *</label
        >

        <input
          type="text"
          [(ngModel)]="categoryData.Name"
          placeholder="e.g. Leather Satchel"
          class="w-full px-4 py-3 bg-white/50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent text-gray-800 font-medium transition-all"
        />
      </div>

      <div>
        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2"
          >Description</label
        >
        <textarea
          [(ngModel)]="categoryData.Description"
          placeholder="Brief description of this category..."
          rows="3"
          class="w-full px-4 py-3 bg-white/50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent text-gray-800 font-medium transition-all resize-none"
        ></textarea>
      </div>
    </div>

    <div class="flex justify-end gap-3 mt-8">
      <button
        (click)="closeModal()"
        class="px-6 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold rounded-xl transition-all"
      >
        Cancel
      </button>
      <button
        (click)="saveCategory()"
        class="px-6 py-3 bg-black hover:bg-gray-800 text-white font-bold rounded-xl shadow-lg hover:shadow-xl transition-all active:scale-95"
      >
        {{ isEditMode ? 'Update Category' : 'Save Category' }}
      </button>
    </div>
  </div>
</div>
