<div class="fixed inset-0 z-[100] flex items-center justify-center bg-walnut-950/80 backdrop-blur-md animate-fade-in p-4 sm:p-8">
  
  <!-- Modal Container -->
  <div class="relative w-full max-w-5xl h-[82vh] bg-white rounded-[28px] border border-cinnamon-200 shadow-[0_25px_80px_rgba(0,0,0,0.25)] flex flex-col overflow-hidden animate-slide-in-up">
    
    <!-- Subtle Top Gradient Accent -->
    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-emerald-500 via-cinnamon-400 to-emerald-500"></div>

    <!-- Header -->
    <div class="h-20 px-8 flex items-center justify-between border-b border-cinnamon-200 bg-cinnamon-50/70 backdrop-blur-sm">
      
      <div class="flex items-center gap-4">
        
        <!-- Icon -->
        <div class="w-11 h-11 rounded-2xl bg-emerald-100 text-emerald-700 flex items-center justify-center border border-emerald-200 shadow-sm">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
              d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
        </div>

        <!-- Title -->
        <div>
          <h2 class="text-xl font-extrabold text-walnut-950 tracking-tight">
            {{ document?.fileName || 'Cloud Document' }}
          </h2>
          <p class="text-[10px] font-bold text-saddle-600 uppercase tracking-[0.2em]">
            Secure Cloud Gateway
          </p>
        </div>
      </div>

      <!-- Close -->
      <button (click)="closePreview()"
        class="p-2 rounded-xl text-walnut-400 hover:text-red-500 hover:bg-red-50 transition-all duration-200 hover:rotate-90">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
            d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Content -->
    <div class="flex-1 flex flex-col items-center justify-center text-center px-6 relative bg-cinnamon-50/20">

      <!-- Floating Glow Background -->
      <div class="absolute w-[400px] h-[400px] bg-emerald-100/40 blur-3xl rounded-full"></div>

      <!-- Card -->
      <div class="relative z-10 bg-white/90 backdrop-blur-xl border border-cinnamon-200 rounded-3xl px-10 py-12 shadow-xl max-w-xl w-full">

        <!-- Icon -->
        <div class="relative w-24 h-24 mx-auto mb-6 flex items-center justify-center rounded-3xl bg-white border border-cinnamon-200 shadow-md">
          
          <svg class="w-12 h-12 text-[#107c41]" fill="currentColor" viewBox="0 0 24 24">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm1.5 13H13v2.5a.5.5 0 0 1-1 0V15H9.5a.5.5 0 0 1 0-1H12v-2.5a.5.5 0 0 1 1 0V14h2.5a.5.5 0 0 1 0 1zM13 9V3.5L18.5 9H13z"/>
          </svg>

          <!-- Status Badge -->
          <div class="absolute -bottom-2 -right-2 bg-emerald-500 text-white p-1.5 rounded-full border-2 border-white shadow">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
                d="M5 13l4 4L19 7"/>
            </svg>
          </div>
        </div>

        <!-- Title -->
        <h3 class="text-3xl font-extrabold text-walnut-900 mb-3 tracking-tight">
          Document Ready
        </h3>

        <!-- Description -->
        <p class="text-walnut-600 text-base leading-relaxed mb-8">
          For security and compatibility reasons, this document cannot be previewed directly.
          Please open it securely using Excel Online.
        </p>

        <!-- Button -->
        <a [href]="targetUrl" target="_blank" rel="noopener noreferrer"
          class="inline-flex items-center justify-center gap-3 w-full py-4 rounded-2xl bg-[#107c41] hover:bg-[#185c37] text-white font-bold text-lg shadow-lg hover:shadow-xl transition-all duration-200 active:scale-95 group">
          
          <svg class="w-6 h-6 group-hover:scale-110 transition-transform" fill="currentColor" viewBox="0 0 24 24">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm1.5 13H13v2.5a.5.5 0 0 1-1 0V15H9.5a.5.5 0 0 1 0-1H12v-2.5a.5.5 0 0 1 1 0V14h2.5a.5.5 0 0 1 0 1zM13 9V3.5L18.5 9H13z"/>
          </svg>

          Open in Excel Online

          <svg class="w-5 h-5 opacity-70 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
          </svg>
        </a>

      </div>
    </div>
  </div>
</div>
