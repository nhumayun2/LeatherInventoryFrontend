<div class="flex h-screen w-full bg-[#eef2f6] p-4 gap-4 overflow-hidden font-sans relative">
  <div
    class="absolute top-0 left-0 w-96 h-96 bg-blue-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"
  ></div>
  <div
    class="absolute top-0 right-0 w-96 h-96 bg-purple-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"
  ></div>
  <div
    class="absolute -bottom-8 left-20 w-96 h-96 bg-pink-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-4000"
  ></div>

  <aside
    class="w-72 bg-white/60 backdrop-blur-xl border border-white/50 shadow-xl rounded-3xl flex flex-col justify-between hidden md:flex z-10 relative"
  >
    <div class="h-24 flex items-center px-8 border-b border-white/20">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 flex items-center justify-center">
          <img
            src="/logo.png"
            alt="Karigar Logo"
            class="w-full h-full object-contain drop-shadow-lg"
          />
        </div>
        <div class="flex flex-col">
          <span class="text-2xl font-black tracking-tight text-gray-800 leading-none">KARIGAR</span>
          <span
            class="text-[10px] font-bold text-blue-600/80 uppercase tracking-[0.2em] leading-tight"
            >Leather Works</span
          >
        </div>
      </div>
    </div>

    <nav class="flex-1 px-4 py-2 flex flex-col">
      <p class="px-4 text-xs font-bold text-gray-500/80 uppercase tracking-wider mb-4 mt-4">
        Main Menu
      </p>

      <div class="relative flex flex-col space-y-2 w-full">
        <div
          class="absolute left-0 w-full h-[48px] rounded-2xl pointer-events-none transition-all duration-500 ease-[cubic-bezier(0.4,0,0.2,1)] z-0 bg-gradient-to-br from-white/70 to-white/10 backdrop-blur-2xl border border-white/80 shadow-[inset_0_2px_4px_rgba(255,255,255,1),inset_0_-2px_4px_rgba(255,255,255,0.4),0_8px_16px_rgba(0,0,0,0.08)]"
          [style.top.px]="activeIndex * 56"
        ></div>

        <a
          routerLink="/dashboard"
          routerLinkActive="active-route text-gray-900"
          class="flex items-center gap-4 px-4 h-[48px] text-gray-600 rounded-2xl group relative z-10 transition-colors"
        >
          <div
            class="p-2 text-gray-400 group-hover:text-blue-600 group-hover:scale-125 transition-all duration-300 group-[.active-route]:text-blue-600 group-[.active-route]:scale-125 group-[.active-route]:drop-shadow-md"
          >
            <svg
              class="w-5 h-5"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"
              />
            </svg>
          </div>
          <span class="font-medium">Dashboard</span>
        </a>

        <a
          routerLink="/products"
          routerLinkActive="active-route text-gray-900"
          class="flex items-center gap-4 px-4 h-[48px] text-gray-600 rounded-2xl group relative z-10 transition-colors"
        >
          <div
            class="p-2 text-gray-400 group-hover:text-purple-600 group-hover:scale-125 transition-all duration-300 group-[.active-route]:text-purple-600 group-[.active-route]:scale-125 group-[.active-route]:drop-shadow-md"
          >
            <svg
              class="w-5 h-5"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"
              />
            </svg>
          </div>
          <span class="font-medium">Products</span>
        </a>

        <a
          routerLink="/orders"
          routerLinkActive="active-route text-gray-900"
          class="flex items-center gap-4 px-4 h-[48px] text-gray-600 rounded-2xl group relative z-10 transition-colors"
        >
          <div
            class="p-2 text-gray-400 group-hover:text-orange-500 group-hover:scale-125 transition-all duration-300 group-[.active-route]:text-orange-500 group-[.active-route]:scale-125 group-[.active-route]:drop-shadow-md"
          >
            <svg
              class="w-5 h-5"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"
              />
            </svg>
          </div>
          <span class="font-medium">Orders</span>
        </a>

        <a
          routerLink="/employees"
          routerLinkActive="active-route text-gray-900"
          class="flex items-center gap-4 px-4 h-[48px] text-gray-600 rounded-2xl group relative z-10 transition-colors"
        >
          <div
            class="p-2 text-gray-400 group-hover:text-green-600 group-hover:scale-125 transition-all duration-300 group-[.active-route]:text-green-600 group-[.active-route]:scale-125 group-[.active-route]:drop-shadow-md"
          >
            <svg
              class="w-5 h-5"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"
              />
            </svg>
          </div>
          <span class="font-medium">Employees</span>
        </a>

        <a
          routerLink="/clients"
          routerLinkActive="active-route text-gray-900"
          class="flex items-center gap-4 px-4 h-[48px] text-gray-600 rounded-2xl group relative z-10 transition-colors"
        >
          <div
            class="p-2 text-gray-400 group-hover:text-pink-600 group-hover:scale-125 transition-all duration-300 group-[.active-route]:text-pink-600 group-[.active-route]:scale-125 group-[.active-route]:drop-shadow-md"
          >
            <svg
              class="w-5 h-5"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"
              ></path>
            </svg>
          </div>
          <span class="font-medium">Clients</span>
        </a>
      </div>
    </nav>

    <div class="p-4">
      <div
        class="flex items-center gap-4 p-3 bg-white/40 backdrop-blur-md rounded-2xl border border-white/40 shadow-sm cursor-pointer hover:bg-white/60 transition-colors"
      >
        <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-400 to-purple-500 p-[2px]">
          <div
            class="w-full h-full rounded-full bg-white flex items-center justify-center overflow-hidden"
          >
            <img
              src="https://api.dicebear.com/9.x/avataaars/svg?seed=Admin"
              alt="Admin"
              class="w-full h-full object-cover"
            />
          </div>
        </div>
        <div>
          <p class="text-sm font-bold text-gray-800">Admin User</p>
          <p class="text-xs text-gray-500">View Profile</p>
        </div>
      </div>
    </div>
  </aside>

  <main
    class="flex-1 bg-white/30 backdrop-blur-2xl border border-white/40 shadow-2xl rounded-3xl overflow-hidden flex flex-col relative z-10 ml-4 h-full"
  >
    <header
      class="h-20 border-b border-white/30 flex items-center justify-between px-8 bg-white/20 backdrop-blur-sm sticky top-0 z-20"
    >
      <div>
        <h1 class="text-2xl font-black text-gray-800 tracking-tight">Overview</h1>
        <p class="text-sm font-medium text-gray-500">Welcome back to the factory</p>
      </div>

      <div class="flex items-center gap-3">
        <button
          class="p-2 text-gray-600 hover:text-gray-900 hover:bg-white/40 rounded-xl transition-colors"
        >
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"
            ></path>
          </svg>
        </button>
      </div>
    </header>

    <div class="flex-1 overflow-auto p-8 relative">
      <ng-content></ng-content>
    </div>
  </main>
</div>
