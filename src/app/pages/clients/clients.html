<div class="h-full font-sans text-walnut-900 pb-10">
  <div
    class="bg-white/80 backdrop-blur-xl border border-cinnamon-100 rounded-3xl shadow-xl p-8 animate-fade-in-up"
  >
    <div class="flex flex-col md:flex-row md:items-start justify-between gap-6 mb-8">
      <div>
        <h2 class="text-3xl font-black text-walnut-950 tracking-tight mb-1">Brand Clients</h2>
        <p class="text-walnut-600 font-medium">Manage your manufacturing partners and clients</p>
      </div>

      <div class="flex items-center gap-3">
        <button
          class="flex items-center gap-2 px-5 py-2.5 bg-white border border-cinnamon-200 hover:bg-cinnamon-50 text-walnut-800 rounded-xl text-sm font-bold transition-all shadow-sm active:scale-95"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"
            ></path>
          </svg>
          Export
        </button>

        <button
          (click)="openModal()"
          class="flex items-center gap-2 px-6 py-2.5 bg-walnut-900 hover:bg-walnut-950 text-white rounded-xl text-sm font-bold shadow-lg transition-all active:scale-95"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="3"
              d="M12 4v16m8-8H4"
            ></path>
          </svg>
          Add Client
        </button>
      </div>
    </div>

    <div class="flex flex-col md:flex-row gap-4 mb-8">
      <div class="relative flex-1 group">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
          <svg
            class="w-5 h-5 text-walnut-400 group-focus-within:text-saddle-600 transition-colors"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
            ></path>
          </svg>
        </div>
        <input
          type="text"
          [(ngModel)]="searchQuery"
          (ngModelChange)="applyFilters()"
          placeholder="Search by client name..."
          class="w-full pl-11 pr-4 py-3.5 bg-cinnamon-50/50 border border-cinnamon-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-saddle-400 text-walnut-900 font-medium placeholder-walnut-400 transition-all shadow-sm"
        />
      </div>
    </div>

    <div class="overflow-x-auto pb-4 custom-scrollbar">
      <table class="w-full text-left whitespace-nowrap">
        <thead>
          <tr
            class="text-[10px] font-black text-walnut-500 uppercase tracking-wider border-b border-cinnamon-200"
          >
            <th class="pb-4 pl-2">
              Client / Brand <span class="ml-1 inline-block text-walnut-300 font-normal">↑↓</span>
            </th>
            <th class="pb-4 px-4">
              Added On <span class="ml-1 inline-block text-walnut-300 font-normal">↑↓</span>
            </th>
            <th class="pb-4 pr-4 text-right w-28">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-cinnamon-100">
          <tr *ngIf="filteredClients.length === 0">
            <td colspan="3" class="py-12 text-center text-walnut-500 font-medium">
              No clients found matching your search.
            </td>
          </tr>

          <tr
            *ngFor="let client of filteredClients; let i = index"
            class="hover:bg-cinnamon-50/80 transition-colors group"
          >
            <td class="py-4 pl-2">
              <div class="flex items-center gap-4">
                <div
                  *ngIf="client.logoUrl"
                  class="w-12 h-12 rounded-xl flex items-center justify-center shadow-sm border border-cinnamon-200 overflow-hidden bg-white shrink-0 p-1"
                >
                  <img
                    [src]="client.logoUrl"
                    [alt]="client.name"
                    class="w-full h-full object-contain"
                  />
                </div>

                <div
                  *ngIf="!client.logoUrl"
                  class="w-12 h-12 rounded-xl flex items-center justify-center font-black text-sm shadow-sm shrink-0"
                  [ngClass]="
                    [
                      'bg-teal-100 text-teal-700',
                      'bg-red-100 text-red-700',
                      'bg-pink-100 text-pink-700',
                      'bg-emerald-100 text-emerald-700',
                      'bg-blue-100 text-blue-700',
                      'bg-indigo-100 text-indigo-700',
                    ][i % 6]
                  "
                >
                  {{ getInitials(client.name) }}
                </div>

                <div>
                  <p class="text-base font-bold text-walnut-950">{{ client.name }}</p>
                  <p class="text-[11px] font-bold text-walnut-400">ID : {{ client.id }}</p>
                </div>
              </div>
            </td>

            <td class="py-4 px-4">
              <span class="text-sm font-medium text-walnut-600">{{
                client.createdDate | date: 'longDate'
              }}</span>
            </td>

            <td class="py-4 pr-4 text-right">
              <div class="relative flex items-center justify-end h-8">
                <div
                  class="absolute right-0 flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity duration-200 pointer-events-none group-hover:pointer-events-auto z-10"
                >
                  <button
                    (click)="openModal(client)"
                    class="p-2 text-saddle-600 hover:text-saddle-700 bg-white hover:bg-cinnamon-50 border border-cinnamon-200 hover:border-saddle-300 rounded-xl shadow-sm transition-all hover:scale-110"
                    title="Edit Client"
                  >
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"
                      ></path>
                    </svg>
                  </button>
                  <button
                    (click)="deleteClient(client.id)"
                    class="p-2 text-red-500 hover:text-red-700 bg-white hover:bg-red-50 border border-cinnamon-200 hover:border-red-200 rounded-xl shadow-sm transition-all hover:scale-110"
                    title="Delete Client"
                  >
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                      ></path>
                    </svg>
                  </button>
                </div>

                <button
                  class="absolute right-0 p-2 text-walnut-400 group-hover:opacity-0 transition-opacity duration-200 z-0"
                >
                  <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                    <path
                      d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"
                    ></path>
                  </svg>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<app-client-modal
  *ngIf="isModalOpen"
  [client]="selectedClientToEdit"
  (close)="closeModal()"
  (save)="handleSave($event)"
>
</app-client-modal>
