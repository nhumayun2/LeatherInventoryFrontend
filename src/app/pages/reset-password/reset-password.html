<div class="min-h-screen w-full bg-cinnamon-50 flex items-center justify-center p-4 font-sans relative overflow-hidden z-0">
  
  <div class="absolute -top-40 -left-40 w-96 h-96 bg-cinnamon-200 rounded-full filter blur-[100px] opacity-70 animate-float -z-10"></div>
  <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-toffee-300 rounded-full filter blur-[100px] opacity-50 animate-float-delayed -z-10"></div>

  <div class="w-full max-w-md bg-white/80 backdrop-blur-xl border border-cinnamon-100 p-8 rounded-3xl shadow-2xl animate-fade-in-up">
    
    <div class="text-center mb-6">
      <div class="w-14 h-14 mx-auto mb-4 bg-cinnamon-50 text-saddle-600 rounded-2xl flex items-center justify-center border border-cinnamon-200 shadow-inner">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
        </svg>
      </div>
      <h2 class="text-2xl font-black text-walnut-950 tracking-tight">Verify Reset Code</h2>
      <p class="text-xs font-medium text-walnut-500 mt-2">Provide the validation token sent to your email to override account credentials.</p>
    </div>

    <div *ngIf="errorMessage" class="mb-5 bg-red-50 border border-red-200 text-red-700 text-sm font-medium px-4 py-3 rounded-xl animate-fade-in flex items-center gap-2">
      <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
      </svg>
      <span>{{ errorMessage }}</span>
    </div>

    <div *ngIf="successMessage" class="mb-5 bg-emerald-50 border border-emerald-200 text-emerald-700 text-sm font-medium px-4 py-3 rounded-xl animate-fade-in flex items-center gap-2">
      <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
      </svg>
      <span>{{ successMessage }}</span>
    </div>

    <form (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label class="block text-xs font-bold text-walnut-600 uppercase tracking-wider mb-2">Target Email</label>
        <input
          type="email"
          name="email"
          [(ngModel)]="resetData.email"
          [disabled]="isLoading"
          placeholder="admin@example.com"
          class="w-full px-4 py-3 bg-cinnamon-100 border border-cinnamon-200 rounded-xl text-walnut-800 font-bold cursor-not-allowed"
          readonly
        />
      </div>

      <div>
        <label class="block text-xs font-bold text-walnut-600 uppercase tracking-wider mb-2">6-Digit Verification Code</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-walnut-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12V5a3 3 0 00-3-3H4a3 3 0 00-3 3v2a3 3 0 003 3h1m3 4V5a3 3 0 013-3h2a3 3 0 013 3v2a3 3 0 01-3 3h-1m-4-8H1m0 4h18M1 16h18"></path>
            </svg>
          </div>
          <input
            type="text"
            name="resetCode"
            maxLength="6"
            [(ngModel)]="resetData.resetCode"
            [disabled]="isLoading"
            placeholder="000000"
            class="w-full pl-11 pr-4 py-3 bg-cinnamon-50/40 border border-cinnamon-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-saddle-400 text-walnut-900 font-black tracking-[0.25em] placeholder:tracking-normal text-center transition-all placeholder:text-walnut-400 placeholder:font-medium disabled:opacity-60"
          />
        </div>
      </div>

      <div>
        <label class="block text-xs font-bold text-walnut-600 uppercase tracking-wider mb-2">New Password</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-walnut-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
            </svg>
          </div>
          <input
            type="password"
            name="newPassword"
            [(ngModel)]="resetData.newPassword"
            [disabled]="isLoading"
            placeholder="Create new password"
            class="w-full pl-11 pr-4 py-3 bg-cinnamon-50/40 border border-cinnamon-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-saddle-400 text-walnut-900 font-bold transition-all placeholder:text-walwalnut-400 placeholder:font-medium disabled:opacity-60"
          />
        </div>
      </div>

      <div>
        <label class="block text-xs font-bold text-walnut-600 uppercase tracking-wider mb-2">Confirm New Password</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-walnut-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
          </div>
          <input
            type="password"
            name="confirmPassword"
            [(ngModel)]="confirmPassword"
            [disabled]="isLoading"
            placeholder="Confirm new password"
            class="w-full pl-11 pr-4 py-3 bg-cinnamon-50/40 border border-cinnamon-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-saddle-400 text-walnut-900 font-bold transition-all placeholder:text-walnut-400 placeholder:font-medium disabled:opacity-60"
          />
        </div>
      </div>

      <button
        type="submit"
        [disabled]="isLoading"
        class="w-full py-3.5 bg-walnut-900 hover:bg-walnut-950 text-white font-bold rounded-xl shadow-lg hover:shadow-xl transition-all active:scale-95 flex items-center justify-center gap-2 disabled:opacity-70"
      >
        <svg *ngIf="isLoading" class="w-5 h-5 animate-spin text-white" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span>{{ isLoading ? 'Committing Changes...' : 'Reset Password' }}</span>
      </button>

      <div class="text-center pt-2">
        <a routerLink="/login" class="inline-flex items-center gap-1.5 text-xs font-bold text-walnut-500 hover:text-walnut-950 transition-colors">
          Cancel and return to Sign In
        </a>
      </div>
    </form>

  </div>
</div>
