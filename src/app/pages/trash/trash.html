<div class="h-full font-sans text-walnut-900 pb-10">
  <div
    class="bg-white/80 backdrop-blur-xl border border-cinnamon-100 rounded-3xl shadow-xl p-8 animate-fade-in-up"
  >
    <div class="flex flex-col md:flex-row md:items-start justify-between gap-6 mb-8">
      <div>
        <h2 class="text-3xl font-black text-walnut-950 tracking-tight mb-1">Recycle Bin</h2>
        <p class="text-walnut-600 font-medium">Manage and restore deleted factory data</p>
      </div>

      <div
        class="flex items-center gap-3 transition-opacity duration-300"
        [ngClass]="selectedItems.size > 0 ? 'opacity-100' : 'opacity-50 pointer-events-none'"
      >
        <p class="text-sm font-bold text-walnut-500 mr-2 hidden md:block">
          {{ selectedItems.size }} selected
        </p>

        <button
          (click)="restoreSelected()"
          class="flex items-center gap-2 px-5 py-2.5 bg-green-50 hover:bg-green-100 text-green-700 border border-green-200 rounded-xl text-sm font-bold transition-all shadow-sm active:scale-95"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"
            ></path>
          </svg>
          Restore
        </button>

        <button
          (click)="deletePermanentlySelected()"
          class="flex items-center gap-2 px-5 py-2.5 bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 rounded-xl text-sm font-bold transition-all shadow-sm active:scale-95"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
            ></path>
          </svg>
          Delete Forever
        </button>
      </div>
    </div>

    <div class="flex flex-col md:flex-row gap-4 mb-8">
      <div class="relative flex-1 group">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
          <svg
            class="w-5 h-5 text-walnut-400 group-focus-within:text-saddle-600 transition-colors"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
            ></path>
          </svg>
        </div>
        <input
          type="text"
          [(ngModel)]="searchQuery"
          (ngModelChange)="applyFilters()"
          placeholder="Search deleted items..."
          class="w-full pl-11 pr-4 py-3.5 bg-cinnamon-50/50 border border-cinnamon-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-saddle-400 text-walnut-900 font-medium placeholder-walnut-400 transition-all shadow-sm"
        />
      </div>
    </div>

    <div *ngIf="isLoading" class="py-12 flex flex-col items-center justify-center animate-pulse">
      <div
        class="w-10 h-10 border-4 border-cinnamon-200 border-t-saddle-600 rounded-full animate-spin mb-4"
      ></div>
      <p class="text-walnut-600 font-bold">Scanning trash bin...</p>
    </div>

    <div *ngIf="!isLoading" class="overflow-x-auto pb-4 custom-scrollbar">
      <table class="w-full text-left whitespace-nowrap">
        <thead>
          <tr
            class="text-[10px] font-black text-walnut-500 uppercase tracking-wider border-b border-cinnamon-200"
          >
            <th class="pb-4 pl-4 w-12">
              <input
                type="checkbox"
                [checked]="isAllSelected()"
                (change)="toggleAll($event)"
                class="w-4 h-4 text-saddle-600 bg-cinnamon-50 border-cinnamon-300 rounded focus:ring-saddle-500 cursor-pointer accent-saddle-600"
              />
            </th>
            <th class="pb-4 px-4">Item Name / Identifier</th>
            <th class="pb-4 px-4">Data Type</th>
            <th class="pb-4 px-4">Deleted On</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-cinnamon-100">
          <tr *ngIf="filteredItems.length === 0">
            <td colspan="4" class="py-16 text-center">
              <div class="inline-flex flex-col items-center justify-center opacity-50">
                <svg
                  class="w-16 h-16 text-walnut-400 mb-4"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="1.5"
                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                  ></path>
                </svg>
                <p class="text-walnut-600 font-bold tracking-wide text-lg">Trash is empty</p>
                <p class="text-walnut-500 font-medium text-sm mt-1">No deleted items found.</p>
              </div>
            </td>
          </tr>

          <tr
            *ngFor="let item of filteredItems"
            class="hover:bg-cinnamon-50/80 transition-colors group cursor-pointer"
            (click)="toggleSelection(item)"
          >
            <td class="py-4 pl-4">
              <input
                type="checkbox"
                [checked]="isSelected(item)"
                (click)="$event.stopPropagation()"
                (change)="toggleSelection(item)"
                class="w-4 h-4 text-saddle-600 bg-cinnamon-50 border-cinnamon-300 rounded focus:ring-saddle-500 cursor-pointer accent-saddle-600"
              />
            </td>

            <td class="py-4 px-4">
              <p class="text-sm font-black text-walnut-950">{{ item.name }}</p>
              <p class="text-[10px] font-bold text-walnut-400 mt-0.5">ID: {{ item.id }}</p>
            </td>

            <td class="py-4 px-4">
              <span
                class="px-3 py-1 text-[10px] font-black uppercase tracking-widest rounded-md border shadow-sm"
                [ngClass]="{
                  'bg-blue-50 text-blue-700 border-blue-200': item.type === 'Product',
                  'bg-purple-50 text-purple-700 border-purple-200': item.type === 'Design',
                  'bg-emerald-50 text-emerald-700 border-emerald-200': item.type === 'Client',
                  'bg-amber-50 text-amber-700 border-amber-200': item.type === 'Employee',
                  'bg-indigo-50 text-indigo-700 border-indigo-200': item.type === 'Order',
                }"
              >
                {{ item.type }}
              </span>
            </td>

            <td class="py-4 px-4">
              <span class="text-sm font-medium text-walnut-600">
                {{ item.deletedAt | date: 'medium' }}
              </span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
