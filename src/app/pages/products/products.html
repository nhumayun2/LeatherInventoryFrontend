<div class="space-y-8 font-sans h-full pb-10">
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
    <div class="animate-slide-in-left">
      <h2 class="text-3xl font-black text-gray-800 tracking-tight">Product Catalog</h2>
      <p class="text-gray-500 font-medium">Manage your product categories</p>
    </div>

    <button
      (click)="openModal()"
      class="group flex items-center gap-2 px-6 py-3 bg-black hover:bg-gray-800 text-white rounded-2xl shadow-xl transition-all active:scale-95 animate-slide-in-right"
    >
      <svg
        class="w-5 h-5 group-hover:rotate-90 transition-transform"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M12 4v16m8-8H4"
        ></path>
      </svg>
      <span class="font-bold">New Category</span>
    </button>
  </div>

  <div class="relative group animate-fade-in-up" style="animation-delay: 100ms">
    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
      <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
        ></path>
      </svg>
    </div>
    <input
      type="text"
      placeholder="Search categories..."
      class="w-full pl-11 pr-4 py-4 bg-white/40 backdrop-blur-md border border-white/60 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500/30 text-gray-800 shadow-sm transition-all"
    />
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
    <div
      *ngFor="let product of products; let i = index"
      (mouseenter)="startCycling(product)"
      (mouseleave)="stopCycling(product)"
      (click)="viewProductDesigns(product.id)"
      class="group relative bg-white/60 backdrop-blur-xl border border-white/50 rounded-3xl p-4 shadow-lg hover:shadow-2xl hover:-translate-y-2 transition-all duration-500 cursor-pointer animate-fade-in-up"
      [style.animation-delay]="i * 100 + 'ms'"
    >
      <div
        class="absolute top-7 right-7 z-20 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity duration-300"
      >
        <button
          (click)="openModal(product, $event)"
          class="p-2.5 bg-white/90 hover:bg-white text-blue-600 rounded-xl shadow-md backdrop-blur-sm transition-all hover:scale-110 border border-white/50"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"
            ></path>
          </svg>
        </button>

        <button
          (click)="deleteProduct(product.id, $event)"
          class="p-2.5 bg-white/90 hover:bg-red-50 text-red-500 hover:text-red-600 rounded-xl shadow-md backdrop-blur-sm transition-all hover:scale-110 border border-white/50"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
            ></path>
          </svg>
        </button>
      </div>

      <div class="h-64 w-full rounded-2xl overflow-hidden relative mb-4 bg-gray-100">
        <img
          [src]="
            product.designs &&
            product.designs.length > 0 &&
            product.designs[product.currentImageIndex].imageUrls &&
            product.designs[product.currentImageIndex].imageUrls.length > 0
              ? product.designs[product.currentImageIndex].imageUrls[0]
              : 'https://placehold.co/600x400?text=No+Image'
          "
          alt="Product Design"
          class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110 animate-fade-in"
        />

        <div
          class="absolute bottom-3 left-0 right-0 flex justify-center gap-1.5"
          *ngIf="product.designs && product.designs.length > 1"
        >
          <span
            *ngFor="let design of product.designs; let dIndex = index"
            class="w-2 h-2 rounded-full transition-all duration-300 shadow-sm"
            [ngClass]="dIndex === product.currentImageIndex ? 'bg-white w-4' : 'bg-white/50'"
          >
          </span>
        </div>

        <div
          class="absolute inset-0 bg-black/10 opacity-0 group-hover:opacity-100 transition-opacity duration-300"
        ></div>
      </div>

      <div class="px-2 pb-2">
        <div class="flex justify-between items-start mb-2">
          <div>
            <p class="text-xs font-bold text-blue-600 uppercase tracking-wider mb-1">Category</p>
            <h3 class="text-2xl font-black text-gray-800 leading-tight">{{ product.name }}</h3>
          </div>

          <span
            class="text-lg font-bold text-gray-900"
            *ngIf="
              product.designs &&
              product.designs.length > 0 &&
              product.designs[product.currentImageIndex].price
            "
          >
            ${{ product.designs[product.currentImageIndex].price }}
          </span>
        </div>

        <p class="text-sm text-gray-500 font-medium mb-4">
          {{ product.description || 'No description provided.' }}
        </p>

        <button
          class="w-full py-3 rounded-xl bg-gray-50 group-hover:bg-black group-hover:text-white text-gray-700 font-bold text-sm transition-colors duration-300 flex items-center justify-center gap-2 pointer-events-none"
        >
          View All Designs
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M14 5l7 7m0 0l-7 7m7-7H3"
            ></path>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<app-product-modal
  *ngIf="isModalOpen"
  [product]="selectedProductToEdit"
  (close)="closeModal()"
  (save)="handleSave($event)"
>
</app-product-modal>
