<div class="min-h-screen w-full bg-cinnamon-50 flex items-center justify-center p-4 font-sans relative overflow-hidden z-0">
  
  <div class="absolute -top-40 -left-40 w-96 h-96 bg-cinnamon-200 rounded-full filter blur-[100px] opacity-70 animate-float -z-10"></div>
  <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-toffee-300 rounded-full filter blur-[100px] opacity-50 animate-float-delayed -z-10"></div>

  <div class="w-full max-w-md bg-white/80 backdrop-blur-xl border border-cinnamon-100 p-8 rounded-3xl shadow-2xl animate-fade-in-up">
    
    <div class="text-center mb-6">
      <div class="w-14 h-14 mx-auto mb-4 bg-cinnamon-50 text-saddle-600 rounded-2xl flex items-center justify-center border border-cinnamon-200 shadow-inner">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
        </svg>
      </div>
      <h2 class="text-2xl font-black text-walnut-950 tracking-tight">Recover Password</h2>
      <p class="text-xs font-medium text-walnut-500 mt-2">Enter your assigned email address to receive a secure 6-digit recovery pin.</p>
    </div>

    <div *ngIf="errorMessage" class="mb-5 bg-red-50 border border-red-200 text-red-700 text-sm font-medium px-4 py-3 rounded-xl animate-fade-in flex items-center gap-2">
      <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
      </svg>
      <span>{{ errorMessage }}</span>
    </div>

    <div *ngIf="successMessage" class="mb-5 bg-emerald-50 border border-emerald-200 text-emerald-700 text-sm font-medium px-4 py-3 rounded-xl animate-fade-in flex items-center gap-2">
      <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
      </svg>
      <span>{{ successMessage }}</span>
    </div>

    <form (ngSubmit)="onSubmit()" class="space-y-5">
      <div>
        <label class="block text-xs font-bold text-walnut-600 uppercase tracking-wider mb-2">Email Address</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-walnut-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
            </svg>
          </div>
          <input
            type="email"
            name="email"
            [(ngModel)]="email"
            [disabled]="isLoading"
            placeholder="admin@example.com"
            class="w-full pl-11 pr-4 py-3 bg-cinnamon-50/40 border border-cinnamon-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-saddle-400 text-walnut-900 font-bold transition-all placeholder:text-walnut-400 placeholder:font-medium disabled:opacity-60"
          />
        </div>
      </div>

      <button
        type="submit"
        [disabled]="isLoading"
        class="w-full py-3.5 bg-walnut-900 hover:bg-walnut-950 text-white font-bold rounded-xl shadow-lg hover:shadow-xl transition-all active:scale-95 flex items-center justify-center gap-2 disabled:opacity-70"
      >
        <svg *ngIf="isLoading" class="w-5 h-5 animate-spin text-white" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span>{{ isLoading ? 'Sending Recovery Code...' : 'Request Code' }}</span>
      </button>

      <div class="text-center pt-2">
        <a routerLink="/login" class="inline-flex items-center gap-1.5 text-xs font-bold text-walnut-500 hover:text-walnut-950 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
          </svg>
          Back to Login
        </a>
      </div>
    </form>

  </div>
</div>
