<div class="h-full font-sans text-walnut-900 pb-10">
  <div
    class="bg-white/80 backdrop-blur-xl border border-cinnamon-100 rounded-3xl shadow-xl p-8 animate-fade-in-up"
  >
    <div class="flex flex-col md:flex-row md:items-start justify-between gap-6 mb-8">
      <div class="flex items-center gap-4">
        <button
          (click)="goBack()"
          class="p-2.5 bg-white border border-cinnamon-200 text-walnut-600 hover:text-walnut-950 hover:bg-cinnamon-50 rounded-xl transition-all shadow-sm active:scale-95"
          title="Back to Finance Dashboard"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2.5"
              d="M10 19l-7-7m0 0l7-7m-7 7h18"
            ></path>
          </svg>
        </button>
        <div>
          <h2 class="text-3xl font-black text-walnut-950 tracking-tight mb-1">
            Client Spreadsheets
          </h2>
          <p class="text-walnut-600 font-medium">
            Manage and edit Excel files for Client #{{ clientId }}
          </p>
        </div>
      </div>
    </div>

    <div class="mb-10">
      <label
        class="relative flex flex-col items-center justify-center w-full h-40 border-2 border-cinnamon-200 border-dashed rounded-2xl cursor-pointer bg-cinnamon-50/50 hover:bg-cinnamon-50 transition-colors overflow-hidden group"
        [class.opacity-50]="isUploading"
        [class.cursor-not-allowed]="isUploading"
      >
        <div class="flex flex-col items-center justify-center pt-5 pb-6 z-10">
          <svg
            *ngIf="!isUploading"
            class="w-10 h-10 mb-3 text-saddle-400 group-hover:text-saddle-600 transition-colors group-hover:-translate-y-1 duration-300"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3-3m3-3v12"
            ></path>
          </svg>

          <div
            *ngIf="isUploading"
            class="w-10 h-10 mb-3 animate-spin rounded-full border-4 border-cinnamon-200 border-t-saddle-500"
          ></div>

          <p class="mb-1 text-sm font-bold text-walnut-700" *ngIf="!isUploading">
            <span class="text-saddle-600">Click to upload</span> or drag and drop
          </p>
          <p class="text-xs text-walnut-500 font-medium" *ngIf="!isUploading">
            Only .xlsx Excel files are supported
          </p>
          <p class="text-sm font-bold text-saddle-600" *ngIf="isUploading">
            Uploading to OneDrive Securely...
          </p>
        </div>
        <input
          type="file"
          class="hidden"
          accept=".xlsx, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
          (change)="onFileSelected($event)"
          [disabled]="isUploading"
        />
      </label>
    </div>

    <div
      *ngIf="documents.length > 0"
      class="flex flex-col sm:flex-row gap-4 mb-6 bg-white/50 p-3 rounded-2xl border border-cinnamon-100"
    >
      <div class="relative flex-1">
        <svg
          class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-walnut-400"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
          ></path>
        </svg>
        <input
          type="text"
          [(ngModel)]="searchQuery"
          placeholder="Search spreadsheets by name..."
          class="w-full pl-10 pr-4 py-2.5 bg-white border border-cinnamon-200 rounded-xl text-sm font-medium focus:outline-none focus:border-saddle-400 focus:ring-1 focus:ring-saddle-400 text-walnut-800 transition-colors"
        />
      </div>

      <div class="sm:w-56 shrink-0 relative">
        <select
          [(ngModel)]="sortOption"
          class="w-full pl-4 pr-10 py-2.5 bg-white border border-cinnamon-200 rounded-xl text-sm font-bold focus:outline-none focus:border-saddle-400 focus:ring-1 focus:ring-saddle-400 text-walnut-800 transition-colors appearance-none cursor-pointer"
        >
          <option value="newest">Sort: Newest First</option>
          <option value="oldest">Sort: Oldest First</option>
          <option value="nameAsc">Sort: Name (A - Z)</option>
          <option value="nameDesc">Sort: Name (Z - A)</option>
        </select>
        <svg
          class="w-5 h-5 absolute right-3 top-1/2 -translate-y-1/2 text-walnut-400 pointer-events-none"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M19 9l-7 7-7-7"
          ></path>
        </svg>
      </div>
    </div>

    <div *ngIf="isLoading" class="flex justify-center items-center py-10">
      <div
        class="animate-spin rounded-full h-8 w-8 border-4 border-cinnamon-200 border-t-saddle-500"
      ></div>
    </div>

    <div *ngIf="!isLoading && documents.length > 0" class="space-y-4">
      <h3 class="text-sm font-black text-walnut-400 uppercase tracking-widest mb-4">
        Cloud Documents
      </h3>

      <div
        *ngFor="let doc of processedDocuments"
        class="flex flex-col sm:flex-row sm:items-center justify-between p-4 bg-white border border-cinnamon-200 rounded-2xl hover:border-saddle-300 hover:shadow-lg transition-all group gap-4"
      >
        <div class="flex items-center gap-4">
          <div
            class="w-12 h-12 bg-emerald-50 border border-emerald-100 text-emerald-600 rounded-xl flex items-center justify-center shrink-0"
          >
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
              ></path>
            </svg>
          </div>
          <div>
            <p class="text-sm font-bold text-walnut-950 truncate max-w-[200px] md:max-w-sm">
              {{ doc.fileName }}
            </p>
            <div class="flex items-center gap-2 mt-1">
              <span
                class="text-[10px] font-black tracking-wider text-walnut-500 bg-cinnamon-50 border border-cinnamon-100 px-2 py-0.5 rounded-md"
                >{{ doc.fileSize }}</span
              >
              <span class="text-[11px] font-bold text-walnut-400">{{
                doc.uploadedAt | date: 'medium'
              }}</span>
            </div>
          </div>
        </div>

        <div
          class="flex items-center gap-2 sm:opacity-0 group-hover:opacity-100 transition-opacity justify-end"
        >
          <button
            (click)="openPreview(doc)"
            class="px-5 py-2.5 bg-walnut-900 hover:bg-walnut-950 text-white text-xs font-bold rounded-xl shadow-md transition-all active:scale-95 flex items-center gap-2"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
            </svg>
            View Document
          </button>
          <button
            (click)="deleteDocument(doc.id, $event)"
            class="p-2.5 text-red-500 hover:text-red-700 bg-white hover:bg-red-50 border border-cinnamon-200 hover:border-red-200 rounded-xl shadow-sm transition-all hover:scale-110"
            title="Delete Spreadsheet"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
              ></path>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div
      *ngIf="!isLoading && documents.length === 0"
      class="py-16 text-center text-walnut-500 font-medium bg-cinnamon-50/50 rounded-2xl border-2 border-dashed border-cinnamon-200"
    >
      <svg
        class="w-12 h-12 mx-auto text-walnut-300 mb-3"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="1.5"
          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
        ></path>
      </svg>
      No spreadsheets uploaded yet. Upload an Excel file above to securely sync to Microsoft Cloud.
    </div>
  </div>
</div>

<!-- NEW: Native Microsoft Excel Previewer Modal -->
<app-onedrive-viewer
  *ngIf="isPreviewOpen"
  [document]="currentDoc"
  (close)="closePreview()"
></app-onedrive-viewer>
