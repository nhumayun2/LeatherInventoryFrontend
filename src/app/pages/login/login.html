<div class="min-h-screen w-full bg-cinnamon-50 flex items-center justify-center p-4 font-sans relative overflow-hidden z-0">
  
  <div class="absolute -top-40 -left-40 w-96 h-96 bg-cinnamon-200 rounded-full filter blur-[100px] opacity-70 animate-float -z-10"></div>
  <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-toffee-300 rounded-full filter blur-[100px] opacity-50 animate-float-delayed -z-10"></div>

  <div class="w-full max-w-md bg-white/80 backdrop-blur-xl border border-cinnamon-100 p-8 rounded-3xl shadow-2xl animate-fade-in-up">
    
    <div class="text-center mb-8">
      <div class="w-16 h-16 mx-auto mb-4 bg-gradient-to-br from-saddle-400 to-walnut-800 rounded-2xl flex items-center justify-center shadow-lg border border-white/20">
        <span class="font-serif font-light text-3xl text-white tracking-[0.02em]">K</span>
      </div>
      <h2 class="text-2xl font-black text-walnut-950 tracking-tight leading-none">KARIGAR</h2>
      <p class="text-[10px] font-bold text-saddle-600 uppercase tracking-[0.2em] mt-1.5">Leather Works Inventory</p>
    </div>

    <div *ngIf="errorMessage" class="mb-5 bg-red-50 border border-red-200 text-red-700 text-sm font-medium px-4 py-3 rounded-xl animate-fade-in flex items-center gap-2">
      <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
      </svg>
      <span>{{ errorMessage }}</span>
    </div>

    <form (ngSubmit)="onSubmit()" class="space-y-5">
      <div>
        <label class="block text-xs font-bold text-walnut-600 uppercase tracking-wider mb-2">Username</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-walnut-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
            </svg>
          </div>
          <input
            type="text"
            name="username"
            [(ngModel)]="loginData.username"
            [disabled]="isLoading"
            placeholder="Enter username"
            class="w-full pl-11 pr-4 py-3 bg-cinnamon-50/40 border border-cinnamon-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-saddle-400 text-walnut-900 font-bold transition-all placeholder:text-walnut-400 placeholder:font-medium disabled:opacity-60"
          />
        </div>
      </div>

      <div>
        <div class="flex justify-between items-center mb-2">
          <label class="block text-xs font-bold text-walnut-600 uppercase tracking-wider">Password</label>
          <a routerLink="/forgot-password" class="text-xs font-bold text-saddle-600 hover:text-saddle-800 transition-colors">Forgot Password?</a>
        </div>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-walnut-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
            </svg>
          </div>
          <input
            type="password"
            name="password"
            [(ngModel)]="loginData.password"
            [disabled]="isLoading"
            placeholder="Enter password"
            class="w-full pl-11 pr-4 py-3 bg-cinnamon-50/40 border border-cinnamon-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-saddle-400 text-walnut-900 font-bold transition-all placeholder:text-walnut-400 placeholder:font-medium disabled:opacity-60"
          />
        </div>
      </div>

      <button
        type="submit"
        [disabled]="isLoading"
        class="w-full mt-2 py-3.5 bg-walnut-900 hover:bg-walnut-950 text-white font-bold rounded-xl shadow-lg hover:shadow-xl transition-all active:scale-95 flex items-center justify-center gap-2 disabled:opacity-70 disabled:pointer-events-none"
      >
        <svg *ngIf="isLoading" class="w-5 h-5 animate-spin text-white" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span>{{ isLoading ? 'Verifying Credentials...' : 'Sign In' }}</span>
      </button>
    </form>

  </div>
</div>
